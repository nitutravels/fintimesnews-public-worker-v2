name: NAMS v6 certified release

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/nams-v6-release.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: nams-v6-certified-release
  cancel-in-progress: true

env:
  APP_IMAGE: ghcr.io/nitutravels/nams-v6-app
  CHROMIUM_IMAGE: ghcr.io/nitutravels/nams-v6-chromium
  SOURCE_REF: nams-hybrid-installer

jobs:
  certify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout NAMS source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_REF }}

      - name: Resolve immutable source revision
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build app smoke-test image
        uses: docker/build-push-action@v6
        with:
          context: nams-v5/app
          platforms: linux/amd64
          load: true
          tags: nams-v6-app:test

      - name: Test app health and authenticated dashboard
        run: |
          set -euo pipefail
          mkdir -p /tmp/nams-test/data /tmp/nams-test/assets
          docker run -d --name nams-v6-app-smoke \
            -e ADMIN_TOKEN=test-token \
            -e NAMS_DOMAIN=localhost \
            -e LIGHTPANDA_CDP=http://127.0.0.1:9 \
            -e CHROMIUM_CDP=http://127.0.0.1:9 \
            -e OLLAMA_BASE_URL=http://127.0.0.1:9 \
            -v "$PWD/nams-v5/config:/app/config:ro" \
            -v /tmp/nams-test/data:/app/data \
            -v /tmp/nams-test/assets:/app/assets \
            -p 18080:8080 nams-v6-app:test
          trap 'docker logs nams-v6-app-smoke || true; docker rm -f nams-v6-app-smoke >/dev/null 2>&1 || true' EXIT
          for i in $(seq 1 45); do
            curl -fsS http://127.0.0.1:18080/health >/tmp/health.json 2>/dev/null && break
            sleep 2
          done
          grep -q '"ok"' /tmp/health.json
          curl -fsS -H 'Authorization: Bearer test-token' http://127.0.0.1:18080/ >/tmp/dashboard.html
          grep -q 'NAMS' /tmp/dashboard.html

      - name: Build Chromium smoke-test image
        uses: docker/build-push-action@v6
        with:
          context: nams-v5/chromium
          platforms: linux/amd64
          load: true
          tags: nams-v6-chromium:test

      - name: Test Chromium CDP and noVNC
        run: |
          set -euo pipefail
          docker run -d --name nams-v6-chromium-smoke --shm-size=1g \
            -p 19223:9223 -p 16080:6080 nams-v6-chromium:test
          trap 'docker logs nams-v6-chromium-smoke || true; docker rm -f nams-v6-chromium-smoke >/dev/null 2>&1 || true' EXIT
          for i in $(seq 1 75); do
            if curl -fsS http://127.0.0.1:19223/json/version >/tmp/chromium.json 2>/dev/null && \
               curl -fsS http://127.0.0.1:16080/vnc.html >/tmp/novnc.html 2>/dev/null; then break; fi
            sleep 2
          done
          grep -q 'webSocketDebuggerUrl' /tmp/chromium.json
          grep -qi 'noVNC' /tmp/novnc.html

      - name: Publish app for amd64 and arm64
        uses: docker/build-push-action@v6
        with:
          context: nams-v5/app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ steps.source.outputs.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}

      - name: Publish Chromium for amd64 and arm64
        uses: docker/build-push-action@v6
        with:
          context: nams-v5/chromium
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.CHROMIUM_IMAGE }}:latest
            ${{ env.CHROMIUM_IMAGE }}:${{ steps.source.outputs.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.source.outputs.sha }}

      - name: Verify published multi-architecture manifests
        run: |
          set -euo pipefail
          tag='${{ steps.source.outputs.sha }}'
          for image in "$APP_IMAGE" "$CHROMIUM_IMAGE"; do
            docker buildx imagetools inspect "$image:$tag" | tee /tmp/manifest.txt
            grep -q 'linux/amd64' /tmp/manifest.txt
            grep -q 'linux/arm64' /tmp/manifest.txt
          done
          printf 'SOURCE_SHA=%s\nAPP_IMAGE=%s:%s\nCHROMIUM_IMAGE=%s:%s\n' \
            "$tag" "$APP_IMAGE" "$tag" "$CHROMIUM_IMAGE" "$tag" | tee nams-v6-release.txt

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: nams-v6-release
          path: nams-v6-release.txt
          retention-days: 30
