name: NAMS v6 prebuilt images

on:
  push:
    branches: [nams-hybrid-installer]
    paths:
      - 'nams-v5/app/**'
      - '.github/workflows/nams-v6-prebuilt.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: nams-v6-prebuilt
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/nitutravels/nams-v6-app

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout deployment branch
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build amd64 test image
        uses: docker/build-push-action@v6
        with:
          context: nams-v5/app
          platforms: linux/amd64
          load: true
          tags: nams-v6-app:test
          cache-from: type=gha,scope=nams-v6-app
          cache-to: type=gha,mode=max,scope=nams-v6-app

      - name: Smoke test dashboard health
        run: |
          set -euo pipefail
          mkdir -p /tmp/nams-test/data /tmp/nams-test/assets
          docker run -d --rm --name nams-v6-smoke \
            -e ADMIN_TOKEN=test-token \
            -e NAMS_DOMAIN=localhost \
            -e LIGHTPANDA_CDP=http://127.0.0.1:9 \
            -e CHROMIUM_CDP=http://127.0.0.1:9 \
            -e OLLAMA_BASE_URL=http://127.0.0.1:9 \
            -v "$PWD/nams-v5/config:/app/config:ro" \
            -v /tmp/nams-test/data:/app/data \
            -v /tmp/nams-test/assets:/app/assets \
            -p 18080:8080 \
            nams-v6-app:test
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:18080/health | tee /tmp/health.json; then break; fi
            sleep 2
          done
          grep -q '"ok"' /tmp/health.json
          curl -fsS -H 'Authorization: Bearer test-token' http://127.0.0.1:18080/ >/tmp/dashboard.html
          grep -q 'NAMS' /tmp/dashboard.html
          docker logs nams-v6-smoke

      - name: Publish multi-architecture image
        uses: docker/build-push-action@v6
        with:
          context: nams-v5/app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=nams-v6-app
          cache-to: type=gha,mode=max,scope=nams-v6-app

      - name: Verify published ARM manifest
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${IMAGE_NAME}:${GITHUB_SHA}" | tee /tmp/manifest.txt
          grep -q 'linux/arm64' /tmp/manifest.txt
          grep -q 'linux/amd64' /tmp/manifest.txt
