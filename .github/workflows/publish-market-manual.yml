name: Publish Market Video Manual

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
      AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      YOUTUBE_PRIVACY_STATUS: public
      YOUTUBE_MADE_FOR_KIDS: "false"
      YOUTUBE_NOTIFY_SUBSCRIBERS: "true"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: nitutravels/fintimesnews-automation
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core git libgl1 libglib2.0-0
          pip install -r private/requirements.txt numpy

      - name: Build base video
        run: bash scripts/build_market_base.sh

      - uses: actions/setup-python@v6
        with:
          python-version: "3.8"

      - uses: actions/cache@v5
        with:
          path: ~/.cache/fintimes-sadtalker-v1
          key: sadtalker-cpu-v1-${{ runner.os }}-py38-${{ hashFiles('scripts/run_sadtalker_cpu.sh') }}

      - name: Render presenter
        run: bash scripts/render_news_presenter.sh

      - name: Compose video
        run: bash scripts/compose_market_video.sh

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Publish video
        run: bash scripts/publish_market_story.sh

      - name: Save publication package
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fintimes-25-june-market-publication
          path: |
            private/output/fintimes_market_2026_06_25_ai_anchor.mp4
            private/output/thumbnail_16x9.jpg
            private/output/youtube_metadata.json
            private/output/youtube_metadata.txt
            private/output/youtube_result.json
          retention-days: 3
          if-no-files-found: warn
