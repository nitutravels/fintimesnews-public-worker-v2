name: Trigger 25 June Publication

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/trigger-2026-06-25-publication.yml

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Start verified 25 June publication workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish-2026-06-25-market.yml --repo "${{ github.repository }}" --ref main
