name: Run Index

on:
  workflow_dispatch:
  schedule:
    - cron: '12 * * * *'

permissions:
  actions: read
  contents: write

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write index
        run: |
          mkdir -p .github/fintimes-status
          curl -sS -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${{ github.token }}" "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=50" > .github/fintimes-status/latest-runs.json
      - name: Commit index
        run: |
          if git diff --quiet -- .github/fintimes-status/latest-runs.json; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .github/fintimes-status/latest-runs.json
          git commit -m "Update run index"
          git push
